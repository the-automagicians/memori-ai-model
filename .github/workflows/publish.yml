name: Publish to npm

# Triggers on any v*.*.* tag push. Publishes via npm Trusted Publishing
# (OIDC) — no NPM_TOKEN needed, authentication is handled automatically
# by npm 11.5+ when id-token: write is granted and the publisher is
# configured on npmjs.com.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    # id-token: write is required for npm to fetch an OIDC token from
    # GitHub and exchange it for a short-lived npm auth token.
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 + npm 11.5+ required for Trusted Publishing.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # CRITICAL: no `env:` block here. Setting NODE_AUTH_TOKEN — even
      # to an empty string — makes npm treat it as token-based auth and
      # skip the OIDC / Trusted Publishing flow, surfacing as ENEEDAUTH
      # or a misleading 404. Must also not reference secrets.NPM_TOKEN.
      - name: Publish to npm via OIDC
        run: npm publish --provenance --access public
