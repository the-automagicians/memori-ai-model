name: Publish to npm

# Triggers on any v*.*.* tag push. Use `npm run release` locally to bump the
# version, tag, and push — this workflow then publishes to npm with provenance.
# Required by n8n community-node policy (npm provenance mandatory from 2026-05-01).

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    # id-token: write enables npm Trusted Publishing via OIDC (no NPM_TOKEN
    # needed once the publisher is configured on npmjs.com). contents: read is
    # the minimum needed for actions/checkout.
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x, which is required for Trusted
          # Publishing (OIDC) support.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Upgrade npm to latest for Trusted Publishing
        run: |
          npm install -g npm@latest
          npm --version
          node --version

      - name: Install dependencies
        run: npm ci

      # actions/setup-node with registry-url writes an .npmrc that
      # interferes with npm's Trusted Publishing auto-detection. Wipe it
      # and unset NPM_CONFIG_USERCONFIG so npm uses defaults and the OIDC
      # flow can engage against https://registry.npmjs.org/.
      - name: Clear generated .npmrc for OIDC publishing
        run: |
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            rm -f "$NPM_CONFIG_USERCONFIG"
          fi
          echo "NPM_CONFIG_USERCONFIG=" >> "$GITHUB_ENV"
          echo "--- npm config ---"
          npm config get registry
          npm config get userconfig

      # `n8n-node release` detects GITHUB_ACTIONS and runs lint + build +
      # `npm publish --provenance`. Auth is via npm Trusted Publishing (OIDC)
      # — no NPM_TOKEN needed since the publisher is configured on npmjs.com.
      #
      # actions/setup-node writes an .npmrc with
      #   //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
      # and defaults the env var to a placeholder. Force it to empty so the
      # token line resolves to nothing and npm 11+ falls back to OIDC.
      - name: Publish
        run: npm run release
        env:
          NPM_CONFIG_PROVENANCE: 'true'
