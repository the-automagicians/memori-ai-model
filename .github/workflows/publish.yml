name: Publish to npm

# Triggers on any v*.*.* tag push. Publishes via npm Trusted Publishing
# (OIDC) — no NPM_TOKEN needed, authentication is handled automatically
# by npm 11.5+ when id-token: write is granted and the publisher is
# configured on npmjs.com.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    # id-token: write is required for npm to fetch an OIDC token from
    # GitHub and exchange it for a short-lived npm auth token.
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 + npm 11.5+ required for Trusted Publishing.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # `n8n-node release` detects GITHUB_ACTIONS and runs lint + build
      # + `npm publish` with NPM_CONFIG_PROVENANCE=true. It is also what
      # the `prepublishOnly` guard expects — calling `npm publish`
      # directly aborts.
      #
      # TEMPORARY: NODE_AUTH_TOKEN is set to claim the brand-new
      # `n8n-nodes-memori-community` name on npm. Trusted Publishing
      # can't be configured for a package that doesn't exist yet, so
      # the first publish must use a token. Once the package is on npm
      # and a Trusted Publisher is configured on npmjs.com, REMOVE this
      # env: block — any value (even '') makes npm skip OIDC and breaks
      # later publishes with ENEEDAUTH or a misleading 404.
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release
